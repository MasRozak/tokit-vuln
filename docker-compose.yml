version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tokit_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: tokit_db
      MYSQL_USER: tokit_user
      MYSQL_PASSWORD: tokit_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      timeout: 10s
      retries: 10
      start_period: 10s

  mongodb:
    image: mongo:latest
    container_name: tokit_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tokit_backend
    restart: always
    expose:
      - "5000"
    env_file:
      - backend/.env
    environment:
      PORT: 5000
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost
    container_name: tokit_frontend
    restart: always
    expose:
      - "3000"
    env_file:
      - frontend/.env
    depends_on:
      - backend

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: tokit_nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

volumes:
  mysql_data:
  mongo_data:
