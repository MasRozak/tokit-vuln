version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tokit_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: tokit_db
      MYSQL_USER: tokit_user
      MYSQL_PASSWORD: tokit_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      timeout: 10s
      retries: 10
      start_period: 10s

  mongodb:
    image: mongo:latest
    container_name: tokit_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tokit_backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - backend/.env
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tokit_frontend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - frontend/.env
    depends_on:
      - backend

volumes:
  mysql_data:
  mongo_data:
